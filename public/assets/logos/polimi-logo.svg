<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Politecnico di Milano logo badge</title>
  <desc id="desc">Stylized circular logo with Polimi initials.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f7fb"/>
      <stop offset="1" stop-color="#d9dfef"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="54" fill="url(#g)" stroke="#a4b0ca" stroke-width="4"/>
  <circle cx="60" cy="60" r="40" fill="#ffffff" stroke="#dae1f4" stroke-width="2"/>
  <text x="60" y="58" text-anchor="middle" font-size="20" font-weight="700" font-family="'Segoe UI', Arial, sans-serif" fill="#1f2b4a">POLI</text>
  <text x="60" y="78" text-anchor="middle" font-size="18" font-weight="700" font-family="'Segoe UI', Arial, sans-serif" fill="#1f2b4a">MI</text>
