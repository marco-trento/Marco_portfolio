<svg xmlns="http://www.w3.org/2000/svg" width="160" height="120" viewBox="0 0 160 120" role="img" aria-labelledby="title desc">
  <title id="title">Improved ESRF logo badge</title>
  <desc id="desc">Stylized ESRF logo badge with luminous orbital rings and refined typography.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b356b"/>
      <stop offset="100%" stop-color="#071f42"/>
    </linearGradient>

    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9be7ff"/>
      <stop offset="100%" stop-color="#4fc3ff"/>
    </linearGradient>

    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dffe7"/>
      <stop offset="100%" stop-color="#3fe0c6"/>
    </linearGradient>

    <linearGradient id="ring3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c6d9ff"/>
      <stop offset="100%" stop-color="#89b4ff"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9affef"/>
      <stop offset="100%" stop-color="#43d8c1"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#021224" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="160" height="120" rx="24" fill="url(#bg)"/>
  <rect x="2" y="2" width="156" height="116" rx="22" fill="none" stroke="#ffffff14"/>

  <g transform="translate(0 1)" filter="url(#shadow)">
    <ellipse cx="44" cy="58" rx="24" ry="10"
             fill="none" stroke="url(#ring1)" stroke-width="3" filter="url(#softGlow)"/>
    <ellipse cx="44" cy="58" rx="24" ry="10"
             transform="rotate(60 44 58)"
             fill="none" stroke="url(#ring2)" stroke-width="3" filter="url(#softGlow)"/>
    <ellipse cx="44" cy="58" rx="24" ry="10"
             transform="rotate(-60 44 58)"
             fill="none" stroke="url(#ring3)" stroke-width="3" filter="url(#softGlow)"/>
    <circle cx="44" cy="58" r="4.8" fill="url(#coreGlow)"/>
  </g>

  <g filter="url(#shadow)">
    <text x="72" y="58"
          font-size="30"
          font-weight="800"
          letter-spacing="0.4"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          fill="#f4f9ff">ESRF</text>

    <text x="73" y="76"
          font-size="10"
          font-weight="600"
          letter-spacing="1.3"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          fill="#b7d6ff">GRENOBLE</text>
  </g>
</svg>
