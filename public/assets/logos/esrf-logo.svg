<svg xmlns="http://www.w3.org/2000/svg" width="176" height="132" viewBox="0 0 176 132" role="img" aria-labelledby="title desc">
  <title id="title">ESRF style logo</title>
  <desc id="desc">Refined ESRF badge with synchrotron-inspired orbital iconography.</desc>
  <defs>
    <linearGradient id="esrf-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d3f7a"/>
      <stop offset="1" stop-color="#07254c"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="164" height="120" rx="24" fill="url(#esrf-bg)" stroke="#2c67a6" stroke-width="2"/>
  <g transform="translate(12 2)">
    <ellipse cx="38" cy="62" rx="22" ry="8.5" fill="none" stroke="#7ed4ff" stroke-width="2.8"/>
    <ellipse cx="38" cy="62" rx="22" ry="8.5" transform="rotate(58 38 62)" fill="none" stroke="#5af0de" stroke-width="2.8"/>
    <ellipse cx="38" cy="62" rx="22" ry="8.5" transform="rotate(-58 38 62)" fill="none" stroke="#b0cbff" stroke-width="2.8"/>
